<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrangerChat — Random WebSocket Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─── RESET & BASE ────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0e0e10;
      --bg-secondary: #1a1a2e;
      --bg-chat: #12121a;
      --bg-bubble-self: #2b5278;
      --bg-bubble-other: #1e1e2e;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --text-primary: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --border: rgba(255, 255, 255, 0.06);
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
      --radius: 12px;
      --radius-lg: 18px;
      --transition: 0.2s cubic-bezier(.4, 0, .2, 1);
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ─── MAIN CONTAINER ──────────────────────── */
    .app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 520px) {
      .app {
        height: 92vh;
        max-height: 720px;
        border-radius: var(--radius-lg);
        box-shadow: 0 0 80px rgba(108, 99, 255, 0.08), 0 0 0 1px var(--border);
      }
    }

    /* ─── HEADER ──────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background var(--transition);
    }

    .status-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    }

    .status-dot.waiting {
      background: var(--orange);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Header Buttons */
    .header-actions {
      display: flex;
      gap: 6px;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
    }

    /* ─── TOOLBAR ─────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(26, 26, 46, 0.6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .role-selector {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .role-btn {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .role-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .role-btn:not(.active):hover {
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.04);
    }

    .role-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* ─── MESSAGES AREA ───────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }

    /* Message Bubbles */
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      animation: slideIn 0.25s ease-out;
      word-wrap: break-word;
      position: relative;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.self {
      align-self: flex-end;
      background: var(--bg-bubble-self);
      border-bottom-right-radius: 4px;
    }

    .msg.other {
      align-self: flex-start;
      background: var(--bg-bubble-other);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 4px;
      text-align: right;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      max-width: 90%;
      padding: 8px 0;
    }

    .msg.system.matched {
      color: var(--green);
      font-weight: 600;
    }

    .msg.system.disconnected {
      color: var(--red);
    }

    .msg.error {
      align-self: center;
      background: rgba(239, 68, 68, 0.12);
      color: var(--red);
      font-size: 12px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Media messages */
    .msg-media {
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .msg-media img {
      max-width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .msg-file {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 4px;
    }

    .msg-file-icon {
      font-size: 24px;
    }

    .msg-file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .msg-file-size {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Typing Indicator — bubble style like Telegram */
    .typing-indicator {
      align-self: flex-start;
      padding: 10px 16px;
      background: var(--bg-bubble-other);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: none;
      gap: 8px;
      align-items: center;
      animation: slideIn 0.25s ease-out;
      margin-bottom: 4px;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }

    .typing-dots {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingBounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    /* ─── INPUT AREA ──────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 14px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .attach-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .attach-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .msg-input {
      flex: 1;
      min-height: 40px;
      max-height: 120px;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color var(--transition);
      line-height: 1.4;
    }

    .msg-input::placeholder {
      color: var(--text-dim);
    }

    .msg-input:focus {
      border-color: var(--accent);
    }

    .msg-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Hidden file input */
    .file-input {
      display: none;
    }

    /* ─── ONBOARDING OVERLAY ──────────────────── */
    .onboarding {
      position: absolute;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .onboarding-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px var(--accent-glow);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .onboarding h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .onboarding p {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      max-width: 280px;
    }

    .username-input {
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      width: 240px;
      text-align: center;
      outline: none;
      transition: border-color var(--transition);
    }

    .username-input:focus {
      border-color: var(--accent);
    }

    .start-btn {
      padding: 12px 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px var(--accent-glow);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    /* ─── ATTACH MENU ─────────────────────────── */
    .attach-menu {
      position: absolute;
      bottom: 70px;
      left: 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 20;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      animation: slideIn 0.2s ease-out;
    }

    .attach-menu.visible {
      display: flex;
    }

    .attach-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition);
      white-space: nowrap;
    }

    .attach-option:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .attach-option span {
      font-size: 18px;
    }

    /* ─── LIGHTBOX (fullscreen image view) ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: zoom-out;
      animation: fadeIn 0.2s ease;
      flex-direction: column;
      gap: 16px;
    }

    .lightbox.visible {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
    }

    .lightbox-actions {
      display: flex;
      gap: 12px;
    }

    .lightbox-btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
    }

    .lightbox-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Clickable images in chat */
    .msg-media img {
      cursor: zoom-in;
    }

    /* Audio wrapper */
    .msg-audio-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-audio-wrap audio {
      width: 100%;
      min-width: 220px;
      border-radius: 6px;
    }

    .msg-audio-download {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      align-self: flex-end;
      opacity: 0.7;
      transition: opacity var(--transition);
    }

    .msg-audio-download:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- Lightbox overlay for fullscreen image viewing -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Full size">
    <div class="lightbox-actions">
      <a class="lightbox-btn" id="lightboxDownload" href="" download="image" target="_blank">⬇ Save Image</a>
      <button class="lightbox-btn" id="lightboxClose">✕ Close</button>
    </div>
  </div>

  <div class="app">
    <!-- Onboarding Screen -->
    <div class="onboarding" id="onboarding">
      <div class="onboarding-logo">💬</div>
      <h1>StrangerChat</h1>
      <p>Chat with random strangers over WebSockets. Telegram vibes, Omegle energy.</p>
      <input type="text" class="username-input" id="usernameInput" placeholder="Pick a username…" maxlength="20"
        autocomplete="off">
      <button class="start-btn" id="startBtn">Start Chatting →</button>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="header-avatar" id="partnerAvatar">🌐</div>
      <div class="header-info">
        <div class="header-name" id="partnerName">Global Chat</div>
        <div class="header-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Offline</span>
        </div>
      </div>
      <div class="header-actions">
      </div>
    </div>

    <!-- Role Toolbar -->
    <div class="toolbar" id="toolbar">
      <span class="role-label" style="flex:1">You: <strong id="myRoleBadge">—</strong></span>
      <select id="userSelect" style="display:none; margin-right:6px; font-size:11px; padding:3px; background:rgba(255,255,255,0.04); color:#e4e4e7; border:1px solid rgba(255,255,255,0.06); border-radius:4px; max-width:140px;"></select>
      <button class="role-btn" id="togglePartnerRole" style="display:none;" title="Toggle selected user role">🔒 Toggle Role</button>
    </div>

    <!-- Chat Messages -->
    <div class="messages" id="messages">
      <!-- Messages will be inserted here -->
      <div class="typing-indicator" id="typingIndicator">
        <span class="typing-label">typing</span>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <!-- Attachment Menu -->
    <div class="attach-menu" id="attachMenu">
      <button class="attach-option" data-type="image">
        <span>🖼️</span> Photo
      </button>
      <button class="attach-option" data-type="document">
        <span>📄</span> Document
      </button>
      <button class="attach-option" data-type="audio">
        <span>🎵</span> Audio
      </button>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <button class="attach-btn" id="attachBtn" title="Attach file">+</button>
      <input type="file" class="file-input" id="fileInput">
      <textarea class="msg-input" id="msgInput" placeholder="Type a message…" rows="1" disabled></textarea>
      <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>

</html>
